<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assistant · 应用介绍</title>
  <style>
    :root{color-scheme:light;--bg:#f3f6fb;--surface:#fff;--text:#152238;--muted:#52637a;--line:#dbe3ef;--primary:#245ca6;--primary-soft:#e8f0fc;--focus:#ffb000}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:16px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif}
    .page{width:min(100%,680px);margin:auto;padding:16px}
    .hero,.card{background:var(--surface);border:1px solid var(--line);border-radius:16px}
    .hero{position:relative;display:grid;grid-template-columns:72px 1fr;gap:14px;align-items:center;padding:18px}
    .logo{width:72px;height:72px;border-radius:18px;display:block}
    h1{font-size:24px;line-height:1.2;margin:0 58px 5px 0}
    .tagline,.muted{color:var(--muted);margin:0}
    .byline{margin:7px 0 0;color:var(--primary);font-size:13px;font-weight:650}
    .lang{position:absolute;right:14px;top:14px;min-width:48px;min-height:44px;border:1px solid var(--primary);border-radius:10px;background:var(--surface);color:var(--primary);font:600 14px/1 system-ui;cursor:pointer}
    .lang:hover{background:var(--primary-soft)}
    .lang:focus-visible,a:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
    .card{margin-top:12px;padding:18px}
    h2{font-size:16px;margin:0 0 12px}
    .features{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .feature{border:1px solid var(--line);border-radius:12px;padding:12px}
    .number{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:9px;background:var(--primary-soft);color:var(--primary);font-weight:700}
    .feature strong{display:block;margin:8px 0 2px}
    .feature p{font-size:14px;color:var(--muted);margin:0}
    .facts{display:flex;gap:24px;margin:0}
    .facts div{min-width:100px}
    dt{font-size:13px;color:var(--muted)}
    dd{font-weight:700;margin:2px 0 0;font-variant-numeric:tabular-nums}
    footer{padding:14px 4px 2px;color:#68768a;font-size:12px;text-align:center}
    footer a{color:inherit;overflow-wrap:anywhere}
    [hidden]{display:none!important}
    @media(max-width:480px){.page{padding:10px}.hero{grid-template-columns:58px 1fr;padding:14px}.logo{width:58px;height:58px;border-radius:14px}h1{font-size:21px}.features{grid-template-columns:1fr}.card{padding:14px}.facts{justify-content:space-between;gap:12px}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>

      <h2 id="info-title" data-zh="应用信息" data-en="App information">应用信息</h2>
      <dl class="facts">
        <div><dt data-zh="安装包大小" data-en="Package size">安装包大小</dt><dd>1.5 MB</dd></div>
        <div><dt data-zh="版本号" data-en="Version">版本号</dt><dd>1.0.2</dd></div>
      </dl>
    </section>

    <footer>
      <span data-zh="开源协议：GPL-3.0 · Git 地址：" data-en="Open source license: GPL-3.0 · Git: ">开源协议：GPL-3.0 · Git 地址：</span><a href="https://github.com/clocteck" target="_blank" rel="noreferrer">https://github.com/clocteck</a>
    </footer>
  </main>
  <script>
    const button=document.getElementById('lang');
    const logo=document.getElementById('logo');
    let language='zh';
    button.addEventListener('click',()=>{
      language=language==='zh'?'en':'zh';
      document.documentElement.lang=language==='zh'?'zh-CN':'en';
      document.querySelectorAll('[data-zh]').forEach(node=>{node.textContent=node.dataset[language]});
      button.textContent=language==='zh'?'EN':'中文';
      button.setAttribute('aria-label',language==='zh'?'Switch to English':'切换为中文');
      logo.alt=language==='zh'?'Assistant 应用图标':'Assistant app icon';
      document.title=language==='zh'?'Assistant · 应用介绍':'Assistant · App overview';
    });
  </script>
</body>
</html>
